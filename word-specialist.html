;

    let currentLesson = TASKS[0]?.lesson || '';
    let currentTab = TASKS[0]?.tab || '';
    let currentTaskIndex = 0;

    const lessonSelect = document.getElementById('lessonSelect');
    const docLine = document.getElementById('docLine');
    const tabStrip = document.getElementById('tabStrip');
    const taskRow = document.getElementById('taskRow');
    const toolEl = document.getElementById('tool');
    const englishEl = document.getElementById('english');
    const vietnameseEl = document.getElementById('vietnamese');

    const unique = values => [...new Set(values)];
    const lessonTasks = () => TASKS.filter(t => t.lesson === currentLesson);
    const tabTasks = () => lessonTasks().filter(t => t.tab === currentTab);

    function renderLessons() {
      const lessons = unique(TASKS.map(t => t.lesson));
      lessonSelect.innerHTML = lessons.map(l => `<option value="${l}">${l}</option>`).join('');
      lessonSelect.value = currentLesson;
    }

    function renderTabs() {
      const tabs = unique(lessonTasks().map(t => t.tab));
      if (!tabs.includes(currentTab)) currentTab = tabs[0];
      tabStrip.innerHTML = tabs.map(tab => `<button class="tab-btn ${tab === currentTab ? 'active' : ''}" data-tab="${tab}">${tab}</button>`).join('');
      tabStrip.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        currentTaskIndex = 0;
        render();
      }));
    }

    function renderTaskButtons() {
      const tasks = tabTasks();
      if (currentTaskIndex >= tasks.length) currentTaskIndex = 0;
      taskRow.innerHTML = tasks.map((t, i) => `<button class="task-btn ${i === currentTaskIndex ? 'active' : ''}" data-index="${i}">Task ${t.task}</button>`).join('');
      taskRow.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        currentTaskIndex = Number(btn.dataset.index);
        render();
      }));
    }

    function renderContent() {
      const active = tabTasks()[currentTaskIndex] || lessonTasks()[0] || TASKS[0];
      if (!active) {
        docLine.innerHTML = '<span>Chưa có dữ liệu</span> · Nội dung sẽ được cập nhật soon.';
        toolEl.textContent = '';
        englishEl.textContent = '';
        vietnameseEl.textContent = '';
        return;
      }
      docLine.innerHTML = `<span>${active.lesson}</span> · ${active.document || 'Open the document and complete the following tasks:'}`;
      toolEl.textContent = active.tool === 'General' ? '' : active.tool;
      englishEl.textContent = active.english;
      vietnameseEl.textContent = active.vietnamese;
    }

    function render() {
      renderLessons();
      renderTabs();
      renderTaskButtons();
      renderContent();
    }

    lessonSelect.addEventListener('change', () => {
      currentLesson = lessonSelect.value;
      currentTab = lessonTasks()[0]?.tab || '';
      currentTaskIndex = 0;
      render();
    });

    render();
  </script>
